server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve markdown files inline instead of downloading as octet-stream.
    location ~* \.md$ {
        default_type text/markdown;
        try_files $uri =404;
    }

    location / {

        # Prevent duplicate routes with and without .html extension
        # Handle subdirectory index.html (e.g., /about/index.html -> /about)
        if ($request_uri ~ ^/(.+)/index(\.html)?(\?|$)) {
            return 301 /$1;
        }

        # Handle root index.html (/index.html -> /)
        if ($request_uri ~ ^/index(\.html)?(\?|$)) {
            return 301 /;
        }

        #Handle other .html files (e.g., /about.html -> /about)
        if ($request_uri ~ ^/(.*)\.html(\?|$)) {
            return 301 /$1;
        }

        try_files $uri/index.html $uri =404;
    }

    # assets, media
    location ~* \.(?:css(\.map)?|js(\.map)?|jpe?g|png|gif|ico|cur|heic|webp|tiff?|mp3|m4a|aac|ogg|midi?|wav|mp4|mov|webm|mpe?g|avi|ogv|flv|wmv)$ {
        expires 7d;
    }

    # svg, fonts
    location ~* \.(?:svgz?|ttf|ttc|otf|eot|woff2?)$ {
        expires    7d;
    }
}
